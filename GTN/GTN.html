  <!-- Only seen when game is inactive  -->

  <section class="lobbyArea" id="lobbyArea" style="display: block">
    <header class="container">
    </header>
    <button class="button1" onclick="createLobby();">Create lobby</button>
    <h2 id="waiting"> </h2>
    <section id="joinSection">
      <label for="joinCode">Enter the join code:</label>
      <input type="number" id="joinCode" name="joinCode" required />
      <button onclick="joinLobby();">join lobby</button>
    </section>
    <section>
      <p1 id="hostWaiting">hello</p1>
    </section>
    <section>

    </section>
  </section>

  <!-- Only seen when game is active  -->
  <section class="gameArea" id="gameArea" style="display: none;">

    <h2 id="playerTurn"></h2>
    <label for="name">Guess here</label>
    <input type="number" id="guessInput" name="guessInput">
    <button onclick="guess();" id="submitGuess">SUBMIT GUESS</button>
    <h5 id="feedback">higher/lower</h3>
  </section>
